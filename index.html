<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florein | Портал</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px 10px;
            overflow-x: hidden;
        }

        .header-banner {
            width: 100%;
            max-width: 600px;
            aspect-ratio: 5 / 1.5;
            overflow: hidden;
            border-radius: 16px;
            border: 1px solid rgba(168, 85, 247, 0.4);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
            margin-bottom: 25px;
            background-image: url('banner.jpg');
            background-size: cover;
            background-position: center;
            background-color: #1e1b4b;
        }

        .nav-menu {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            background: rgba(21, 29, 47, 0.6);
            padding: 6px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 10px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn.active {
            background: #a855f7;
            color: #fff;
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.3);
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 600px;
            padding: 10px 0;
        }

        .tab-content {
            display: none;
            width: 100%;
            animation: fadeIn 0.4s ease forwards;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-card {
            background: rgba(21, 29, 47, 0.65);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(168, 85, 247, 0.2);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .status-card h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(45deg, #e9d5ff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 0 5px;
            width: 100%;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
        }

        .live-badge {
            background: rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.3);
            color: #c084fc;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(168, 85, 247, 0); }
            100% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0); }
        }

        .news-feed {
            display: flex;
            flex-direction: row;
            gap: 16px;
            width: 100%;
            overflow-x: auto;
            padding: 10px 5px 25px 5px;
            scrollbar-width: none;
            scroll-snap-type: x mandatory;
        }

        .news-feed::-webkit-scrollbar { display: none; }

        .florein-card {
            background: #111622;
            border: 1px solid rgba(168, 85, 247, 0.15);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            padding: 24px;
            min-width: 280px;
            max-width: 280px;
            scroll-snap-align: center;
            flex-shrink: 0;
        }

        .card-date {
            font-size: 13px;
            color: #c084fc;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .florein-card h3 { font-size: 17px; color: #ffffff; margin-bottom: 12px; }
        .florein-card p { font-size: 14px; color: #94a3b8; margin-bottom: 20px; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }

        .card-btn {
            margin-top: auto;
            color: #a855f7;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
        }

        .info-text { text-align: center; color: #475569; padding: 40px; width: 100%; }
        
        .footer-badge {
            background-color: rgba(30, 27, 75, 0.4);
            border: 1px solid #312e81;
            padding: 10px 20px;
            border-radius: 30px;
            margin-top: 30px;
            color: #a78bfa;
            font-size: 11px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="header-banner"></div>

    <div class="nav-menu">
        <button class="nav-btn active" onclick="openTab(this, 'main-tab')">Главная</button>
        <button class="nav-btn" onclick="openTab(this, 'news-tab')">Новости</button>
    </div>

    <div class="main-content">
        <div id="main-tab" class="tab-content active">
            <div class="status-card">
                <h1>Сайт в разработке</h1>
                <p>Привет! Сейчас я активно настраиваю модули и верстку. Совсем скоро здесь откроется полноценный функционал профиля.</p>
            </div>
        </div>

        <div id="news-tab" class="tab-content">
            <div class="section-header">
                <span class="section-title">Новости СВО</span>
                <span class="live-badge">● Live</span>
            </div>
            <div class="news-feed" id="news-container">
                <div class="info-text" id="loading-text">Загрузка сводок...</div>
            </div>
        </div>
    </div>

    <div class="footer-badge">🛡️ ВАШИ ДАННЫЕ ЗАЩИЩЕНЫ</div>

    <script>
        const loadedNewsLinks = new Set();
        const container = document.getElementById('news-container');
        const keywords = ['СВО', 'спецоперация', 'фронт', 'армия', 'оборона', 'Минобороны', 'военкор', 'ДНР', 'ЛНР', 'Украина', 'ВСУ', 'наступление', 'удар', 'тыл'];

        function openTab(btnElement, tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
        }

        async function fetchLiveNews() {
            try {
                const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://ura.news/rss&t=' + new Date().getTime());
                const data = await response.json();
                
                if (data.status !== 'ok') return;

                const filteredItems = data.items.filter(item => {
                    const text = (item.title + " " + item.description).toLowerCase();
                    return keywords.some(word => text.includes(word.toLowerCase()));
                }).slice(0, 5); // Лимит: 5 новостей

                // Очищаем контейнер перед вставкой, чтобы убрать старые записи
                container.innerHTML = '';

                filteredItems.forEach(item => {
                    const dateObj = new Date(item.pubDate.replace(' ', 'T'));
                    const day = String(dateObj.getDate()).padStart(2, '0');
                    const month = String(dateObj.getMonth() + 1).padStart(2, '0');
                    const year = dateObj.getFullYear().toString().slice(-2);
                    const time = `${String(dateObj.getHours()).padStart(2, '0')}:${String(dateObj.getMinutes()).padStart(2, '0')}`;
                    
                    const formattedDate = `${day}.${month}.${year} ${time}`;

                    const card = document.createElement('div');
                    card.className = 'florein-card';
                    card.innerHTML = `
                        <div class="card-date">${formattedDate}</div>
                        <h3>${item.title}</h3>
                        <p>${item.description.replace(/<[^>]*>?/gm, '').substring(0, 150)}...</p>
                        <a href="${item.link}" target="_blank" class="card-btn">Читать на URA.RU ➔</a>
                    `;
                    container.appendChild(card);
                });
            } catch (error) { console.error('Ошибка:', error); }
        }

        document.addEventListener("DOMContentLoaded", () => {
            fetchLiveNews();
            setInterval(fetchLiveNews, 15000);
        });
    </script>
</body>
</html>
