<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florein | Портал</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px 10px;
            overflow-x: hidden;
        }

        /* Баннер Florein */
        .header-banner {
            width: 100%;
            max-width: 600px;
            aspect-ratio: 5 / 1.5;
            overflow: hidden;
            border-radius: 16px;
            border: 1px solid rgba(168, 85, 247, 0.4);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
            margin-bottom: 25px;
            background-image: url('banner.jpg'); /* Оставьте свой путь к баннеру */
            background-size: cover;
            background-position: center;
            background-color: #1e1b4b; /* Заглушка, если картинки нет */
        }

        /* Навигация */
        .nav-menu {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            background: rgba(21, 29, 47, 0.6);
            padding: 6px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 10px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn.active {
            background: #a855f7;
            color: #fff;
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.3);
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 600px;
            padding: 10px 0;
        }

        .tab-content {
            display: none;
            width: 100%;
            animation: fadeIn 0.4s ease forwards;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-card {
            background: rgba(21, 29, 47, 0.65);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(168, 85, 247, 0.2);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .status-card h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(45deg, #e9d5ff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .status-card p {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.6;
        }

        /* Заголовок новостей в стиле URA.RU */
        .ura-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .ura-header h2 {
            color: #f97316; /* Оранжевый */
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .ura-header p {
            color: #64748b;
            font-size: 14px;
        }

        /* Горизонтальная лента новостей */
        .news-feed {
            display: flex;
            flex-direction: row;
            gap: 16px;
            width: 100%;
            overflow-x: auto;
            padding-bottom: 20px;
            /* Скрываем скроллбар, но оставляем прокрутку */
            scrollbar-width: none;
            -ms-overflow-style: none;
            scroll-snap-type: x mandatory;
        }

        .news-feed::-webkit-scrollbar {
            display: none;
        }

        /* Карточка в стиле URA.RU */
        .florein-card {
            background: #11151e;
            border: 1px solid #1e293b;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            padding: 24px;
            min-width: 290px;
            max-width: 290px;
            scroll-snap-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            flex-shrink: 0;
        }

        .card-date {
            font-size: 13px;
            color: #f97316; /* Оранжевая дата */
            font-weight: 800;
            margin-bottom: 12px;
        }

        .florein-card h3 {
            font-size: 18px;
            color: #ffffff;
            line-height: 1.4;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .florein-card p {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.5;
            margin-bottom: 20px;
            /* Ограничение текста в 4 строки */
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Синяя ссылка на источник */
        .card-btn {
            margin-top: auto;
            align-self: flex-start;
            color: #3b82f6; 
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            transition: opacity 0.2s;
        }

        .card-btn:hover {
            opacity: 0.8;
        }

        .info-text {
            text-align: center;
            color: #475569;
            padding: 40px;
            font-size: 15px;
            width: 100%;
        }

        .footer-badge {
            background-color: rgba(30, 27, 75, 0.4);
            border: 1px solid #312e81;
            padding: 10px 20px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 30px;
        }

        .footer-badge span {
            color: #a78bfa;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="header-banner"></div>

    <div class="nav-menu">
        <button class="nav-btn active" onclick="openTab(this, 'main-tab')">Главная</button>
        <button class="nav-btn" onclick="openTab(this, 'news-tab')">Новости</button>
    </div>

    <div class="main-content">
        
        <div id="main-tab" class="tab-content active">
            <div class="status-card">
                <h1>Сайт в разработке</h1>
                <p>Привет! Сейчас я активно настраиваю модули и верстку. Совсем скоро здесь откроется полноценный функционал профиля.</p>
            </div>
        </div>

        <div id="news-tab" class="tab-content">
            <div class="ura-header">
                <h2>Свежие новости (URA.RU)</h2>
                <p>Самые актуальные события и сплетни</p>
            </div>
            
            <div class="news-feed" id="news-container">
                <div class="info-text">Получение актуальных данных...</div>
            </div>
        </div>

    </div>

    <div class="footer-badge">
        <span>🛡️ ВАШИ ДАННЫЕ ЗАЩИЩЕНЫ</span>
    </div>

    <script>
        // Используем публичный сервис для обхода CORS и загружаем RSS URA.RU в JSON формате
        const RSS_FEED_URL = 'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fura.news%2Frss';

        // Резервные данные, если API не отвечает (в точности со второго скриншота)
        const fallbackNews = [
            {
                title: "Посол РФ в Армении вызван в Москву для консультаций на фоне сближения с ЕС",
                pubDate: "2026-05-30 10:00:00",
                description: "Посол России в Армении Сергей Копыркин вызван в Москву для консультаций из-за того, что Армения укрепляет связи с ЕС и западными партнерами.",
                link: "https://ura.news"
            },
            {
                title: "Самый маленький кремль России сохранился в свердловской глубинке — ему 428 лет",
                pubDate: "2026-05-30 09:30:00",
                description: "Верхотурский кремль — это не просто еще одна историческая достопримечательность, а уникальное место, сохранившее свой облик с XVII века.",
                link: "https://ura.news"
            },
            {
                title: "Лебединое озеро, День защиты детей: куда пойти в Челябинске 30-31 мая",
                pubDate: "2026-05-30 08:15:00",
                description: "Последние выходные мая обещают быть насыщенными. Рассказываем челябинцам и гостям города, как увидеть премьеры и провести время с семьей.",
                link: "https://ura.news"
            }
        ];

        function openTab(btnElement, tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
        }

        function renderCards(newsArray) {
            const container = document.getElementById('news-container');
            container.innerHTML = '';

            newsArray.forEach(item => {
                // Форматируем дату в DD.MM.YYYY
                let dateObj = new Date(item.pubDate);
                let day = String(dateObj.getDate()).padStart(2, '0');
                let month = String(dateObj.getMonth() + 1).padStart(2, '0');
                let year = dateObj.getFullYear();
                let formattedDate = `${day}.${month}.${year}`;

                // Очищаем описание от HTML-тегов, если они пришли из RSS
                let tempDiv = document.createElement("div");
                tempDiv.innerHTML = item.description;
                let cleanDesc = tempDiv.textContent || tempDiv.innerText || "";

                container.innerHTML += `
                    <div class="florein-card">
                        <div class="card-date">${formattedDate}</div>
                        <h3>${item.title}</h3>
                        <p>${cleanDesc}</p>
                        <a href="${item.link}" target="_blank" class="card-btn">Читать на URA.RU ➔</a>
                    </div>
                `;
            });
        }

        async function loadFloreinNews() {
            try {
                const response = await fetch(RSS_FEED_URL);
                if (!response.ok) throw new Error('CORS или Network Error');
                
                const data = await response.json();
                if (data.status !== 'ok') throw new Error('API Error');

                // Берем первые 10 новостей из фида
                renderCards(data.items.slice(0, 10));

            } catch (error) {
                console.warn('Не удалось загрузить живой фид. Использую резервные данные.', error);
                // Если нет интернета или ошибка CORS - подгружаем красивые карточки из массива fallbackNews
                renderCards(fallbackNews);
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadFloreinNews();
            // Фоновое обновление раз в 5 минут
            setInterval(loadFloreinNews, 300000);
        });
    </script>
</body>
</html>
