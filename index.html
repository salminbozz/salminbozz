<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florein | Портал</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px 10px;
            overflow-x: hidden;
        }

        /* Баннер Florein */
        .header-banner {
            width: 100%;
            max-width: 600px;
            aspect-ratio: 5 / 1.5;
            overflow: hidden;
            border-radius: 16px;
            border: 1px solid rgba(168, 85, 247, 0.4);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
            margin-bottom: 25px;
            background-image: url('banner.jpg');
            background-size: cover;
            background-position: center;
            background-color: #1e1b4b;
        }

        /* Навигация */
        .nav-menu {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            background: rgba(21, 29, 47, 0.6);
            padding: 6px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 10px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn.active {
            background: #a855f7;
            color: #fff;
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.3);
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 600px;
            padding: 10px 0;
        }

        .tab-content {
            display: none;
            width: 100%;
            animation: fadeIn 0.4s ease forwards;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-card {
            background: rgba(21, 29, 47, 0.65);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(168, 85, 247, 0.2);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .status-card h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(45deg, #e9d5ff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .status-card p {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.6;
        }

        /* Заголовок в родном дизайне Florein */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 0 5px;
            width: 100%;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
        }

        .live-badge {
            background: rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.3);
            color: #c084fc;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(168, 85, 247, 0); }
            100% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0); }
        }

        /* Горизонтальная лента новостей */
        .news-feed {
            display: flex;
            flex-direction: row;
            gap: 16px;
            width: 100%;
            overflow-x: auto;
            padding: 10px 5px 25px 5px;
            scrollbar-width: none;
            -ms-overflow-style: none;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
        }

        .news-feed::-webkit-scrollbar {
            display: none;
        }

        /* Карточка объединяющая структуру URA.RU и цвета Florein */
        .florein-card {
            background: #111622;
            border: 1px solid rgba(168, 85, 247, 0.15);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            padding: 24px;
            min-width: 280px;
            max-width: 280px;
            scroll-snap-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .florein-card:hover {
            border-color: rgba(168, 85, 247, 0.4);
            transform: translateY(-2px);
        }

        /* Анимация появления новой карточки */
        .new-item-anim {
            animation: slideInLeft 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px) scale(0.95); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }

        .card-date {
            font-size: 13px;
            color: #c084fc; /* Фиолетовая дата */
            font-weight: 800;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-date::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #a855f7;
            border-radius: 50%;
        }

        .florein-card h3 {
            font-size: 17px;
            color: #ffffff;
            line-height: 1.4;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .florein-card p {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.5;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Фиолетовая ссылка */
        .card-btn {
            margin-top: auto;
            align-self: flex-start;
            color: #a855f7; 
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            transition: color 0.2s;
        }

        .card-btn:hover {
            color: #e9d5ff;
        }

        .info-text {
            text-align: center;
            color: #475569;
            padding: 40px;
            font-size: 15px;
            width: 100%;
        }

        .footer-badge {
            background-color: rgba(30, 27, 75, 0.4);
            border: 1px solid #312e81;
            padding: 10px 20px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 30px;
        }

        .footer-badge span {
            color: #a78bfa;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="header-banner"></div>

    <div class="nav-menu">
        <button class="nav-btn active" onclick="openTab(this, 'main-tab')">Главная</button>
        <button class="nav-btn" onclick="openTab(this, 'news-tab')">Новости</button>
    </div>

    <div class="main-content">
        
        <div id="main-tab" class="tab-content active">
            <div class="status-card">
                <h1>Сайт в разработке</h1>
                <p>Привет! Сейчас я активно настраиваю модули и верстку. Совсем скоро здесь откроется полноценный функционал профиля.</p>
            </div>
        </div>

        <div id="news-tab" class="tab-content">
            <div class="section-header">
                <span class="section-title">Свежие новости</span>
                <span class="live-badge">● Live</span>
            </div>
            
            <div class="news-feed" id="news-container">
                <div class="info-text" id="loading-text">Синхронизация потока...</div>
            </div>
        </div>

    </div>

    <div class="footer-badge">
        <span>🛡️ ВАШИ ДАННЫЕ ЗАЩИЩЕНЫ</span>
    </div>

    <script>
        // Храним ссылки на уже загруженные новости, чтобы не дублировать их
        const loadedNewsLinks = new Set();
        const container = document.getElementById('news-container');
        let isFirstLoad = true;

        function openTab(btnElement, tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
        }

        // Парсинг RSS через надежный сервис rss2json
        async function fetchLiveNews() {
            try {
                // Используем api.rss2json.com вместо нестабильного allorigins и ручного парсинга XML
                const rssUrl = 'https://ura.news/rss';
                const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Ошибка сети');
                
                const data = await response.json();
                
                // Проверяем статус ответа самого сервиса
                if (data.status !== 'ok') throw new Error('Ошибка парсинга RSS');

                const items = data.items.slice(0, 10);
                let hasNewItems = false;
                
                // Идем с конца в начало, чтобы при добавлении (prepend) порядок сохранился
                items.reverse().forEach(item => {
                    const link = item.link;
                    
                    // Если новости еще нет в ленте — добавляем
                    if (!loadedNewsLinks.has(link)) {
                        hasNewItems = true;
                        loadedNewsLinks.add(link);
                        
                        const title = item.title;
                        
                        // Нормализуем дату для корректной работы во всех браузерах (в т.ч. Safari на iOS)
                        const pubDate = item.pubDate.replace(' ', 'T'); 
                        let description = item.description;
                        
                        // Очистка от HTML тегов
                        let tempDiv = document.createElement("div");
                        tempDiv.innerHTML = description;
                        description = tempDiv.textContent || tempDiv.innerText || "";

                        // Форматирование даты
                        const dateObj = new Date(pubDate);
                        const day = String(dateObj.getDate()).padStart(2, '0');
                        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
                        const year = dateObj.getFullYear();
                        const hours = String(dateObj.getHours()).padStart(2, '0');
                        const minutes = String(dateObj.getMinutes()).padStart(2, '0');
                        const formattedDate = `${day}.${month}.${year} в ${hours}:${minutes}`;

                        // Создаем карточку
                        const card = document.createElement('div');
                        card.className = 'florein-card';
                        
                        // Если это не первая загрузка, добавляем анимацию появления
                        if (!isFirstLoad) {
                            card.classList.add('new-item-anim');
                        }

                        card.innerHTML = `
                            <div class="card-date">${formattedDate}</div>
                            <h3>${title}</h3>
                            <p>${description}</p>
                            <a href="${link}" target="_blank" class="card-btn">Читать источник ➔</a>
                        `;

                        // Вставляем новость в начало горизонтального списка
                        container.prepend(card);
                    }
                });

                // Убираем текст загрузки
                const loadingText = document.getElementById('loading-text');
                if (loadingText) loadingText.remove();

                // При появлении новых постов прокручиваем слайдер в самое начало
                if (hasNewItems && !isFirstLoad) {
                    container.scrollTo({ left: 0, behavior: 'smooth' });
                }
                
                isFirstLoad = false;

            } catch (error) {
                console.error('Ошибка загрузки фида:', error);
                if (isFirstLoad) {
                    const loadingText = document.getElementById('loading-text');
                    if (loadingText) {
                        loadingText.innerHTML = 'Ошибка соединения. Повторная попытка...';
                    }
                }
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            fetchLiveNews();
            // Проверка новых постов каждые 30 секунд
            setInterval(fetchLiveNews, 30000);
        });
    </script>
</body>
</html>

```
