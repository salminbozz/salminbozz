<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florein | Портал</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px 10px;
            overflow-x: hidden;
        }

        .header-banner {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 3 / 1.2;
            overflow: hidden;
            border-radius: 16px;
            border: 1px solid rgba(168, 85, 247, 0.4);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
            margin-bottom: 20px;
        }

        .header-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .nav-menu {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            background: rgba(21, 29, 47, 0.6);
            padding: 6px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 10px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn.active {
            background: #a855f7;
            color: #fff;
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.3);
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 800px;
            padding: 10px 0;
        }

        .tab-content {
            display: none;
            width: 100%;
            animation: fadeIn 0.4s ease forwards;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-card {
            background: rgba(21, 29, 47, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(168, 85, 247, 0.2);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .status-card h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #e9d5ff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .status-card p {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.6;
        }

        .news-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .news-card {
            background: rgba(21, 29, 47, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .news-card h2 {
            font-size: 20px;
            color: #e2e8f0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .news-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 650px) {
            .news-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .news-item {
            background: rgba(11, 15, 25, 0.6);
            border: 1px solid rgba(168, 85, 247, 0.15);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .news-item:hover {
            transform: translateY(-2px);
            border-color: rgba(168, 85, 247, 0.4);
        }

        .news-item img {
            width: 100%;
            height: 190px;
            object-fit: cover;
            background: #151d2f;
        }

        .news-item-body {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
            justify-content: space-between;
        }

        .news-item-body h3 {
            font-size: 16px;
            color: #f1f5f9;
            line-height: 1.4;
            font-weight: 600;
        }

        .news-item-body p {
            font-size: 13px;
            color: #94a3b8;
            line-height: 1.5;
        }

        .news-date {
            font-size: 11px;
            color: #a855f7;
            font-weight: bold;
            text-transform: uppercase;
        }
