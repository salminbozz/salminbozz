<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florein | Портал</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px 10px;
            overflow-x: hidden;
        }

        /* Баннер Florein */
        .header-banner {
            width: 100%;
            max-width: 600px;
            aspect-ratio: 5 / 1.5;
            overflow: hidden;
            border-radius: 16px;
            border: 1px solid rgba(168, 85, 247, 0.4);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
            margin-bottom: 25px;
            background-image: url('banner.jpg');
            background-size: cover;
            background-position: center;
        }

        /* Навигация */
        .nav-menu {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            background: rgba(21, 29, 47, 0.6);
            padding: 6px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 10px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn.active {
            background: #a855f7;
            color: #fff;
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.3);
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 600px; /* Сужаем до мобильного формата под твои скрины */
            padding: 10px 0;
        }

        .tab-content {
            display: none;
            width: 100%;
            animation: fadeIn 0.4s ease forwards;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-card {
            background: rgba(21, 29, 47, 0.65);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(168, 85, 247, 0.2);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .status-card h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(45deg, #e9d5ff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .status-card p {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.6;
        }

        /* Заголовок в стиле Florein */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 0 5px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
        }

        .live-badge {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Вертикальная лента новостей */
        .news-feed {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        /* Карточка в родных цветах твоего сайта */
        .florein-card {
            background: #111622;
            border: 1px solid #1e293b;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .media-box {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #181f32;
            overflow: hidden;
            position: relative;
        }

        .media-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Фиолетовая дата из оригинального дизайна */
        .card-date {
            font-size: 12px;
            color: #c084fc; 
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .florein-card h3 {
            font-size: 17px;
            color: #ffffff;
            line-height: 1.4;
            font-weight: 700;
        }

        .florein-card p {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.5;
        }

        /* Ссылка на источник */
        .card-btn {
            margin-top: 5px;
            align-self: flex-start;
            color: #a855f7;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            transition: color 0.2s;
        }

        .card-btn:hover {
            color: #e9d5ff;
        }

        .info-text {
            text-align: center;
            color: #475569;
            padding: 40px;
            font-size: 15px;
            width: 100%;
        }

        /* Нижний багд */
        .footer-badge {
            background-color: rgba(30, 27, 75, 0.4);
            border: 1px solid #312e81;
            padding: 10px 20px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 30px;
        }

        .footer-badge span {
            color: #a78bfa;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="header-banner"></div>

    <div class="nav-menu">
        <button class="nav-btn active" onclick="openTab(this, 'main-tab')">Главная</button>
        <button class="nav-btn" onclick="openTab(this, 'news-tab')">Новости</button>
    </div>

    <div class="main-content">
        
        <div id="main-tab" class="tab-content active">
            <div class="status-card">
                <h1>Сайт в разработке</h1>
                <p>Привет! Сейчас я активно настраиваю модули и верстку. Совсем скоро здесь откроется полноценный функционал профиля.</p>
            </div>
        </div>

        <div id="news-tab" class="tab-content">
            <div class="section-header">
                <span class="section-title">🎬 Военная хроника | Репортажи</span>
                <span class="live-badge">● Прямой эфир</span>
            </div>
            
            <div class="news-feed" id="news-container">
                <div class="info-text">Получение актуальных данных...</div>
            </div>
        </div>

    </div>

    <div class="footer-badge">
        <span>🛡️ ВАШИ ДАННЫЕ ЗАЩИЩЕНЫ</span>
    </div>

    <script>
        // Стабильный фид Ленты напрямую, без использования ломающихся прокси
        const LENTA_FEED_URL = 'https://lenta.ru/ext/json/news';

        // Ключевые слова для фильтрации гражданского контента (автономера, выплаты мимо)
        const svoKeywords = ['сво', 'всу', 'минобороны', 'донецк', 'луганск', 'херсон', 'запорож', 'пво', 'обстрел', 'фронт', 'штурм', 'боец', 'армия', 'беспилотник', 'дрон', 'авдеев', 'купян', 'снаряд', 'группировк'];

        function openTab(btnElement, tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
        }

        async function loadFloreinNews() {
            const container = document.getElementById('news-container');
            
            try {
                const response = await fetch(LENTA_FEED_URL);
                const data = await response.json();

                container.innerHTML = '';
                let matchCount = 0;

                data.news.forEach(item => {
                    let titleLower = item.title.toLowerCase();
                    let textLower = (item.rightcol || '').toLowerCase();

                    // Проверяем на строгое соответствие военной хронике
                    let isMilitary = svoKeywords.some(word => titleLower.includes(word) || textLower.includes(word));

                    if (isMilitary && matchCount < 10) {
                        matchCount++;

                        // Формируем красивую дату в стиле твоих скринов: 30.05.2026, 12:40 | СВО ХРОНИКА
                        let dateObj = item.modified ? new Date(item.modified * 1000) : new Date();
                        let day = String(dateObj.getDate()).padStart(2, '0');
                        let month = String(dateObj.getMonth() + 1).padStart(2, '0');
                        let year = dateObj.getFullYear();
                        let hours = String(dateObj.getHours()).padStart(2, '0');
                        let minutes = String(dateObj.getMinutes()).padStart(2, '0');
                        
                        let formattedDate = `⏱ ${day}.${month}.${year}, ${hours}:${minutes} | СВО ХРОНИКА`;

                        // Ссылка на источник
                        let finalLink = item.url.startsWith('http') ? item.url : `https://lenta.ru${item.url}`;

                        // Качественная картинка новости или базовая заглушка
                        let imageSrc = item.image_url || 'https://images.unsplash.com/photo-1579546929518-9e396f3cc809?q=80&w=600';

                        container.innerHTML += `
                            <div class="florein-card">
                                <div class="media-box">
                                    <img src="${imageSrc}" alt="Кадры репортажа">
                                </div>
                                <div class="card-body">
                                    <div class="card-date">${formattedDate}</div>
                                    <h3>${item.title}</h3>
                                    <p>${item.rightcol || 'Оперативные сведения с направления операции.'}</p>
                                    <a href="${finalLink}" target="_blank" class="card-btn">Читать источник →</a>
                                </div>
                            </div>
                        `;
                    }
                });

                if (matchCount === 0) {
                    container.innerHTML = `<div class="info-text">Новых сводок не найдено. Обновление фида...</div>`;
                }

            } catch (error) {
                console.error(error);
                container.innerHTML = `<div class="info-text" style="color: #ef4444;">Ошибка обновления потока. Проверьте сеть.</div>`;
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadFloreinNews();
            // Фоновое обновление раз в минуту
            setInterval(loadFloreinNews, 60000);
        });
    </script>
</body>
</html>
