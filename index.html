<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florein | Портал</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background-color: #0b0f19; 
            color: #f8fafc; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px 10px 90px 10px; /* Отступ снизу, чтобы плашка не перекрывала контент */
        }
        
        .header-banner { 
            width: 100%; 
            max-width: 600px; 
            aspect-ratio: 5 / 1.5; 
            border-radius: 16px; 
            margin-bottom: 25px; 
            background-color: #1e1b4b; 
            background-image: url('banner.jpg'); 
            background-size: cover; 
            background-position: center;
            border: 1px solid rgba(168, 85, 247, 0.4); 
        }
        
        .nav-menu { display: flex; gap: 15px; margin-bottom: 25px; background: rgba(21, 29, 47, 0.6); padding: 6px; border-radius: 12px; }
        .nav-btn { background: transparent; border: none; color: #94a3b8; padding: 10px 24px; font-weight: 600; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { background: #a855f7; color: #fff; box-shadow: 0 4px 12px rgba(168, 85, 247, 0.3); }
        
        .tab-content { display: none; width: 100%; max-width: 600px; }
        .tab-content.active { display: block; }
        
        #main-tab { display: none; flex-direction: column; justify-content: center; align-items: center; }
        #main-tab.active { display: flex; }
        
        /* Стили для блока Минобороны */
        .contract-card { 
            background: linear-gradient(135deg, #151d2f 0%, #0f172a 100%); 
            padding: 30px; 
            border-radius: 20px; 
            text-align: center; 
            border: 1px solid rgba(168, 85, 247, 0.3);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            width: 100%;
        }
        .contract-card h1 {
            font-size: 22px;
            color: #ffffff;
            margin-bottom: 15px;
        }
        .contract-card p {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        .contract-btn {
            display: inline-block;
            background: #a855f7;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 10px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.3);
            transition: 0.2s ease;
        }
        .contract-btn:hover {
            background: #9333ea;
            transform: translateY(-1px);
        }

        /* Фиксированная кнопка-логотип Max (Всегда в правом нижнем углу) */
        .download-image-link {
            position: fixed;
            bottom: 55px; /* Находится ровно над нижней плашкой */
            right: 20px;
            width: 60px; /* Сделал аккуратной круглой кнопкой-иконкой */
            height: 60px; 
            background-image: url('max.png'); /* Исправлено на .png */
            background-size: cover;
            background-position: center;
            border-radius: 50%; /* Идеально круглая форма как на логотипе */
            border: 2px solid #a855f7;
            box-shadow: 0 8px 24px rgba(168, 85, 247, 0.3);
            z-index: 1000;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: block;
            animation: slideUp 0.4s ease-out;
        }
        .download-image-link:hover {
            transform: scale(1.08) translateY(-2px);
            box-shadow: 0 12px 28px rgba(168, 85, 247, 0.5);
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding: 0 5px; }
        .live-badge { background: rgba(168, 85, 247, 0.15); color: #c084fc; font-size: 11px; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.4); } 70% { box-shadow: 0 0 0 6px rgba(168, 85, 247, 0); } 100% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0); } }
        
        .news-feed { display: flex; flex-direction: column; gap: 16px; width: 100%; }
        .florein-card { background: #111622; border: 1px solid rgba(168, 85, 247, 0.15); border-radius: 16px; padding: 24px; width: 100%; }
        .card-date { font-size: 13px; color: #c084fc; font-weight: 800; margin-bottom: 12px; }
        h3 { font-size: 17px; color: #ffffff; margin-bottom: 12px; }
        p { font-size: 14px; color: #94a3b8; margin-bottom: 20px; line-height: 1.5; }
        .card-btn { color: #a855f7; text-decoration: none; font-weight: 700; }
        
        /* Нижняя закрепленная плашка защиты данных */
        .footer-badge { 
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #070a12; 
            border-top: 1px solid rgba(168, 85, 247, 0.2);
            padding: 12px 0; 
            text-align: center;
            font-size: 11px; 
            color: #a78bfa; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            z-index: 1010;
        }

        /* На мобилках оставляем кнопку фиксированной, просто уменьшаем отступы */
        @media (max-width: 640px) {
            .download-image-link {
                bottom: 50px;
                right: 15px;
                width: 55px;
                height: 55px;
            }
        }
    </style>
</head>
<body>

    <div class="header-banner"></div>
    
    <div class="nav-menu">
        <button class="nav-btn active" onclick="openTab(this, 'main-tab')">Главная</button>
        <button class="nav-btn" onclick="openTab(this, 'news-tab')">Новости</button>
    </div>

    <div class="tab-content active" id="main-tab">
        <div class="contract-card">
            <h1>Служба по контракту в Министерстве Обороны</h1>
            <p>Узнайте ключевые условия, актуальные требования к кандидатам, подробную информацию о выплатах, льготах и социальных гарантиях для военнослужащих по контракту.</p>
            <a href="https://contract.gosuslugi.ru/" target="_blank" class="contract-btn">Подробнее о контракте</a>
        </div>
    </div>

    <div class="tab-content" id="news-tab">
        <div class="section-header">
            <h2>Новости СВО</h2>
            <span class="live-badge">● Live</span>
        </div>
        <div class="news-feed" id="news-container"></div>
    </div>

    <div class="footer-badge">🛡️ ВАШИ ДАННЫЕ ЗАЩИЩЕНЫ</div>

    <a href="https://max.ru/" target="_blank" class="download-image-link" title="Скачать Max"></a>

    <script>
        const container = document.getElementById('news-container');
        const loadedLinks = new Set();
        
        const keywords = [
            'СВО', 'спецоперац', 'фронт', 'арми', 'оборон', 'минобороны', 'военкор', 
            'украин', 'всу', 'наступ', 'удар', 'тыл', 'росс', 'конфликт', 'боев', 
            'днр', 'лнр', 'донецк', 'луганск', 'херсон', 'запорож', 'харьков', 'бахмут', 
            'авдеевк', 'крым', 'севастополь', 'белгород', 'курск', 'брянск', 'донбасс',
            'бпла', 'беспилот', 'дрон', 'артиллери', 'авиаци', 'пво', 'танк', 
            'снаряд', 'ракет', 'рсзо', 'вертолет', 'самолет', 'техник', 
            'генштаб', 'мобилизац', 'песков', 'путин', 'шойгу', 'белоусов', 'спецслужб', 
            'полит', 'санкц', 'переговор', 'гуманитар', 'волонтер', 'безопасн', 
            'границ', 'обстрел', 'провокац', 'террорист', 'диверс', 'опорник'
        ];

        function openTab(btn, id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        async function fetchNews() {
            try {
                const cacheBuster = Date.now();
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://ura.news/rss&t=${cacheBuster}`);
                const data = await res.json();
                
                if (data.status !== 'ok') {
                    console.log("Ошибка API:", data.message);
                    return;
                }
                
                data.items.filter(item => {
                    const text = (item.title + item.description).toLowerCase();
                    return keywords.some(k => text.includes(k.toLowerCase()));
                }).reverse().forEach(item => {
                    if (!loadedLinks.has(item.link)) {
                        loadedLinks.add(item.link);
                        
                        const d = new Date(item.pubDate.replace(' ', 'T'));
                        const dateStr = `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear().toString().slice(-2)} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                        
                        const card = document.createElement('div');
                        card.className = 'florein-card';
                        card.innerHTML = `
                            <div class="card-date">${dateStr}</div>
                            <h3>${item.title}</h3>
                            <p>${item.description.replace(/<[^>]*>/g, '').substring(0, 150)}...</p>
                            <a href="${item.link}" target="_blank" class="card-btn">Читать на URA.RU ➔</a>
                        `;
                        container.prepend(card);
                    }
                });
            } catch (e) { console.error('Ошибка:', e); }
        }

        fetchNews();
        setInterval(fetchNews, 30000);
    </script>
</body>
</html>
