<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florein | Портал</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px 10px;
            overflow-x: hidden;
        }

        /* Твой оригинальный баннер Florein */
        .header-banner {
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 5 / 1.5;
            overflow: hidden;
            border-radius: 16px;
            border: 1px solid rgba(168, 85, 247, 0.4);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
            margin-bottom: 20px;
            background-image: url('banner.jpg');
            background-size: cover;
            background-position: center;
        }

        .nav-menu {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            background: rgba(21, 29, 47, 0.6);
            padding: 6px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 10px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn.active {
            background: #a855f7;
            color: #fff;
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.3);
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            padding: 10px 0;
        }

        .tab-content {
            display: none;
            width: 100%;
            animation: fadeIn 0.4s ease forwards;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-card {
            background: rgba(21, 29, 47, 0.65);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(168, 85, 247, 0.2);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }

        .status-card h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(45deg, #e9d5ff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .status-card p {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.6;
        }

        /* Стилизация секции Новостей под URA.RU */
        .section-title {
            font-size: 32px;
            font-weight: 800;
            color: #ff6b00; /* Фирменный оранжевый стиль заголовка */
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .section-subtitle {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Трёхколоночная сетка как на скрине */
        .news-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%;
        }

        @media (min-width: 768px) {
            .news-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (min-width: 1024px) {
            .news-grid { grid-template-columns: repeat(3, 1fr); }
        }

        /* Карточка точь-в-точь как у URA.RU */
        .ura-card {
            background: #111622;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 280px;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .ura-card:hover {
            transform: translateY(-2px);
            border-color: #334155;
        }

        .ura-date {
            font-size: 13px;
            color: #ff6b00; /* Оранжевая дата */
            font-weight: 700;
        }

        .ura-card h3 {
            font-size: 18px;
            color: #ffffff;
            line-height: 1.4;
            font-weight: 700;
        }

        .ura-card p {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .ura-link {
            margin-top: auto;
            color: #0084ff; /* Синие аккуратные ссылки */
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: color 0.2s;
        }

        .ura-link:hover {
            color: #38bdf8;
        }

        .loading-text {
            grid-column: 1 / -1;
            text-align: center;
            color: #475569;
            padding: 40px;
            font-size: 15px;
        }

        .footer-badge {
            background-color: #1e1b4b;
            border: 1px solid #312e81;
            padding: 8px 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 30px;
        }

        .footer-badge span {
            color: #a78bfa;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="header-banner"></div>

    <div class="nav-menu">
        <button class="nav-btn active" onclick="openTab(this, 'main-tab')">Главная</button>
        <button class="nav-btn" onclick="openTab(this, 'news-tab')">Новости</button>
    </div>

    <div class="main-content">
        
        <div id="main-tab" class="tab-content active">
            <div class="status-card">
                <h1>Сайт в разработке</h1>
                <p>Привет! Сейчас я активно настраиваю модули и верстку. Совсем скоро здесь откроется полноценный функционал профиля.</p>
            </div>
        </div>

        <div id="news-tab" class="tab-content">
            <h1 class="section-title">Свежие новости СВО</h1>
            <p class="section-subtitle">Самые актуальные события с передовой</p>
            
            <div class="news-grid" id="news-grid">
                <div class="loading-text">Загрузка актуальных сводок...</div>
            </div>
        </div>

    </div>

    <div class="footer-badge">
        <span>🛡️ Ваши данные защищены</span>
    </div>

    <script>
        // Используем стабильный парсер без CORS ограничений
        const RSS_FEED_URL = 'https://api.rss2json.com/v1/api.json?rss_url=https://tass.ru/rss/vna.xml';

        // Жесткий фильтр ключевых слов СВО, чтобы убрать «номера», «выплаты» и прочий мусор
        const filterKeywords = ['сво', 'всу', 'минобороны', 'донецк', 'луганск', 'херсон', 'запорож', 'пво', 'обстрел', 'фронт', 'штурм', 'боец', 'армия', 'беспилотник', 'дрон', 'авдеев', 'купян', 'снаряд', 'группировк'];

        function openTab(btnElement, tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
        }

        async function fetchUraStyleNews() {
            const grid = document.getElementById('news-grid');
            
            try {
                const response = await fetch(RSS_FEED_URL);
                const data = await response.json();

                if (data.status !== 'ok') throw new Error();

                grid.innerHTML = ''; 
                let count = 0;

                data.items.forEach(item => {
                    let titleLower = item.title.toLowerCase();
                    let descLower = (item.description || '').toLowerCase();

                    // Проверяем строгое соответствие оборонной тематике
                    let isSVO = filterKeywords.some(word => titleLower.includes(word) || descLower.includes(word));

                    if (isSVO && count < 6) { // Выводим максимум 6 плиток, как в блоках
                        count++;

                        // Форматируем дату в стиль ДД.ММ.ГГГГ
                        let pubDate = new Date(item.pubDate);
                        let day = String(pubDate.getDate()).padStart(2, '0');
                        let month = String(pubDate.getMonth() + 1).padStart(2, '0');
                        let year = pubDate.getFullYear();
                        let dateString = `${day}.${month}.${year}`;

                        // Очистка описания от лишних тегов
                        let cleanDesc = (item.description || 'Оперативная сводка с линии соприкосновения.').replace(/<\/?[^>]+(>|$)/g, "");

                        grid.innerHTML += `
                            <div class="ura-card">
                                <div class="ura-date">${dateString}</div>
                                <h3>${item.title}</h3>
                                <p>${cleanDesc}</p>
                                <a href="${item.link}" target="_blank" class="ura-link">
                                    Читать на ТАСС ->
                                </a>
                            </div>
                        `;
                    }
                });

                if (count === 0) {
                    grid.innerHTML = `<div class="loading-text">Новых военных сводок не обнаружено. Ожидайте обновления...</div>`;
                }

            } catch (error) {
                grid.innerHTML = `<div class="loading-text">Ошибка загрузки фида новостей. Пожалуйста, обновите страницу.</div>`;
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            fetchUraStyleNews();
            setInterval(fetchUraStyleNews, 60000); // Обновление раз в минуту
        });
    </script>
</body>
</html>
